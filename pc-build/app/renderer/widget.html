<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1620;
            --bg-widget: rgba(18, 25, 35, 0.94);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #edf2f7;
            --text-secondary: #9ca9bb;
            --accent-purple: #5b8cff;
            --accent-pink: #4677f0;
            --success: #2fb67c;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        /* Контейнер виджета */
        .widget-container {
            background: var(--bg-widget);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 
                0 20px 50px rgba(4, 10, 18, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            -webkit-app-region: no-drag;
        }

        .widget-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink), var(--accent-purple));
            border-radius: 18px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
            /* animation: rotate-gradient 3s linear infinite; */ /* Отключено по просьбе пользователя */
        }

        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .widget-container:hover::before {
            opacity: 0.08;
        }

        .widget-container.compact {
            padding: 10px;
        }

        /* Заголовок виджета */
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .widget-container.compact .widget-header {
            display: none;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .player-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: var(--warning);
            font-weight: 600;
        }

        .rating-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
            vertical-align: middle;
        }

        /* Управление виджетом */
        .widget-controls {
            display: flex;
            gap: 8px;
        }

        .control-button {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 12px;
            -webkit-app-region: no-drag;
        }

        .control-button:hover {
            background: rgba(91, 140, 255, 0.16);
            border-color: var(--accent-purple);
            color: var(--text-primary);
            transform: scale(1.05);
        }

        .control-button:active {
            transform: scale(0.95);
        }

        /* Колода */
        .deck-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }

        .widget-container.expanded .deck-container {
            gap: 8px;
            margin-bottom: 10px;
        }

        .deck-card {
            position: relative;
            background: var(--bg-primary);
            border-radius: 8px;
            aspect-ratio: 0.8;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 
                0 8px 18px rgba(4, 10, 18, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .deck-card:hover {
            transform: translateY(-2px) scale(1.03);
            z-index: 10;
            box-shadow: 
                0 16px 28px rgba(4, 10, 18, 0.36),
                0 0 0 1px rgba(91, 140, 255, 0.18);
            border-color: var(--accent-purple);
        }

        .deck-card.evolution {
            background: linear-gradient(135deg, 
                rgba(91, 140, 255, 0.16), 
                rgba(70, 119, 240, 0.08)
            );
            box-shadow: 
                0 8px 18px rgba(70, 119, 240, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .deck-card.evolution:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 16px 28px rgba(70, 119, 240, 0.3),
                0 0 0 1px rgba(91, 140, 255, 0.2);
        }

        .deck-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            filter: brightness(0.9);
            transition: all 0.3s ease;
        }

        .deck-card:hover img {
            filter: brightness(1.1) saturate(1.2);
            transform: scale(1.05);
        }

        .evolution-badge {
            position: absolute;
            top: 3px;
            right: 3px;
            font-size: 10px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(70, 119, 240, 0.35);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 2px 8px rgba(70, 119, 240, 0.35);
            }
            50% {
                transform: scale(1.2);
                box-shadow: 0 4px 15px rgba(70, 119, 240, 0.5);
            }
        }

        /*.card-cost {
            position: absolute;
            top: 3px;
            left: 3px;
            background: rgba(5, 5, 17, 0.9);
            color: var(--accent-purple);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 6px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(5px);
        }*\

        /* Информация о колоде */
        .deck-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .widget-container.compact .deck-info {
            display: none;
        }

        .average-elixir {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .average-elixir-value {
            font-weight: 700;
            color: var(--accent-purple);
            font-size: 16px;
        }

        .deck-weakness {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
        }

        /* Режимы отображения */
        .widget-container.analytical .deck-weakness {
            display: block;
        }

        .widget-container.compact .deck-weakness {
            display: none;
        }

        /* Эффект прозрачности */
        .widget-container {
            opacity: var(--widget-opacity, 1);
        }

        /* Тултипы */
        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 17, 0.95);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 100;
            border: 1px solid var(--border-color);
            margin-bottom: 5px;
        }

        .deck-card:hover .tooltip {
            opacity: 1;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .widget-container {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Кнопка закрепления */
        .pin-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .pin-button.pinned {
            color: var(--accent-purple);
            transform: rotate(45deg);
        }

        /* Перетаскивание */
        .widget-container {
            cursor: move;
        }

        .widget-container.dragging {
            opacity: 0.8;
            cursor: grabbing;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .deck-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="widget-container expanded" id="widget">
        <div class="widget-header">
            <div class="player-info">
                <span class="player-name" id="player-name">Загрузка...</span>
                <span class="player-rating">
                    <img src="./assets/rating.png" class="rating-icon" alt="rating"> <span id="player-rating">0</span>
                </span>
            </div>
            <div class="widget-controls">
                <button class="control-button pin-button" id="pin-button" onclick="togglePin()" title="Закрепить поверх окон">
                    📌
                </button>
                <button class="control-button" onclick="toggleMode()" title="Изменить режим">
                    📊
                </button>
                <button class="control-button" onclick="closeWidget()" title="Закрыть">
                    ✕
                </button>
            </div>
        </div>

        <div class="deck-container" id="deck-container">
            <!-- Карты будут добавлены динамически -->
        </div>

        <div class="deck-info">
            <div class="average-elixir">
                <span>⚡</span>
                <span class="average-elixir-value" id="average-elixir">0.0</span>
            </div>
            <div class="deck-weakness" id="deck-weakness">
                <!-- Слабости колоды -->
            </div>
        </div>
    </div>

    <script>
        let isPinned = false;
        let currentMode = 'expanded'; // compact, expanded, analytical
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let widgetX = 0;
        let widgetY = 0;

        // Получаем данные игрока
        window.electronAPI.on('player-data', (data) => {
            updateWidget(data);
        });

        function getDeckModeLabel(mode) {
            return mode === 'gt' ? 'GT' : 'Path of Legends';
        }

        // Обновление виджета
        function updateWidget(playerData) {
            // Проверяем если игрок не найден
            if (playerData.player_not_found || playerData.success === false) {
                const nickname = playerData.searched_nickname || 
                                playerData.ocr_result?.nickname || 'Неизвестный';
                showPlayerNotFoundMessage(nickname);
                return;
            }
            
            const player = playerData.player || {};
            const decks = playerData.decks || [];
            const deckMode = playerData.deck_mode || 'pol';
            
            // Обновляем информацию об игроке
            document.getElementById('player-name').textContent = player.name || 'Неизвестный';
            document.getElementById('player-rating').textContent = (player.rating || 0).toLocaleString();
            
            // Обновляем колоду
            if (decks.length > 0) {
                const deck = decks[0];
                displayDeck(deck);
            } else {
                // Нет колоды в выбранном режиме
                showNoDeckMessage(deckMode);
            }
        }

        // Показать сообщение "Игрок не найден"
        function showPlayerNotFoundMessage(nickname) {
            document.getElementById('player-name').textContent = nickname;
            document.getElementById('player-rating').textContent = '-';
            
            const container = document.getElementById('deck-container');
            container.innerHTML = `
                <div style="
                    grid-column: 1 / -1;
                    text-align: center;
                    padding: 20px;
                    color: #ef4444;
                    font-size: 14px;
                ">
                    ❌ Игрок ${nickname} не найден
                </div>
            `;
            document.getElementById('average-elixir').textContent = '-';
            document.getElementById('deck-weakness').textContent = '';
        }

        // Показать сообщение об отсутствии колоды в выбранном режиме
        function showNoDeckMessage(deckMode) {
            const deckModeLabel = getDeckModeLabel(deckMode);
            const container = document.getElementById('deck-container');
            container.innerHTML = `
                <div style="
                    grid-column: 1 / -1;
                    text-align: center;
                    padding: 20px;
                    color: #fbbf24;
                    font-size: 14px;
                ">
                    ⚠️ Игрок не играл в ${deckModeLabel}
                </div>
            `;
            document.getElementById('average-elixir').textContent = '-';
            document.getElementById('deck-weakness').textContent = '';
        }

        // Отображение колоды
        async function displayDeck(deck) {
            const container = document.getElementById('deck-container');
            container.innerHTML = '';

            if (!deck.cards || deck.cards.length === 0) return;

            for (let index = 0; index < deck.cards.length; index++) {
                const card = deck.cards[index];
                const cardEl = document.createElement('div');
                cardEl.className = 'deck-card';

                // evolution_level: 0=обычная, 1=эволюция, 2+=чемпион
                const evolutionLevel = card.evolution_level || 0;
                const isEvolution = evolutionLevel === 1 || card.is_evolution;
                const isHero = evolutionLevel >= 2;

                if (isEvolution) {
                    cardEl.classList.add('evolution');
                }
                if (isHero) {
                    cardEl.classList.add('hero');
                }

                // Определяем fallback URL для случая, если кеш недоступен
                let fallbackUrl = card.icon_url;
                if (card.display_icon_url) {
                    fallbackUrl = card.display_icon_url;
                } else if (isHero && card.hero_icon_url) {
                    fallbackUrl = card.hero_icon_url;
                } else if (isEvolution && card.evolution_icon_url) {
                    fallbackUrl = card.evolution_icon_url;
                }

                // Получаем путь к закешированному изображению
                const level = card.evolution_level || 0;
                let imageSource = fallbackUrl;

                try {
                    const cachedPath = await window.electronAPI.invoke('cache:get-card-image', card.name, level);
                    if (cachedPath) {
                        imageSource = cachedPath;
                    }
                } catch (error) {
                    console.warn(`⚠️ Не удалось получить кеш для ${card.name}, используем URL`);
                }

                // Бейдж только для эволюций
                const badge = isEvolution ? '<span class="evolution-badge">💎</span>' : '';

                cardEl.innerHTML = `
                    <img src="${imageSource}" alt="${card.name}" loading="lazy" onerror="this.src='${fallbackUrl}'">
                    ${badge}
                    <div class="tooltip">${card.name}</div>
                `;

                container.appendChild(cardEl);
            }
            
            // Обновляем средний эликсир
            const avgElixir = deck.average_elixir || calculateAverageElixir(deck.cards);
            document.getElementById('average-elixir').textContent = avgElixir.toFixed(1);
            
            // Анализ слабостей (простой пример)
            analyzeWeakness(deck);
        }

        // Расчет среднего эликсира
        function calculateAverageElixir(cards) {
            const costs = cards
                .map(c => c.elixir_cost)
                .filter(c => c !== null && c !== undefined);
            return costs.length > 0 ? costs.reduce((a, b) => a + b, 0) / costs.length : 0;
        }

        // Анализ слабостей колоды
        function analyzeWeakness(deck) {
            const weaknessEl = document.getElementById('deck-weakness');
            const cards = deck.cards || [];
            
            // Простой анализ
            const hasSpells = cards.some(c => c.type === 'spell');
            const hasTank = cards.some(c => c.hitpoints > 3000);
            const hasAir = cards.some(c => c.targets_air);
            
            let weakness = '';
            if (!hasSpells) weakness = 'Нет заклинаний';
            else if (!hasTank) weakness = 'Нет танка';
            else if (!hasAir) weakness = 'Слаба против воздуха';
            else weakness = 'Сбалансирована';
            
            weaknessEl.textContent = weakness;
        }

        // Переключение режима
        function toggleMode() {
            const widget = document.getElementById('widget');
            const modes = ['compact', 'expanded', 'analytical'];
            const currentIndex = modes.indexOf(currentMode);
            currentMode = modes[(currentIndex + 1) % modes.length];
            
            widget.className = `widget-container ${currentMode}`;
            
            // Изменяем размер окна в зависимости от режима
            switch(currentMode) {
                case 'compact':
                    window.electronAPI.widget.resize(400, 100);
                    break;
                case 'expanded':
                    window.electronAPI.widget.resize(450, 200);
                    break;
                case 'analytical':
                    window.electronAPI.widget.resize(450, 250);
                    break;
            }
        }

        // Закрепление окна (рабочий вариант из старого проекта)
        function togglePin() {
            isPinned = !isPinned;
            const button = document.getElementById('pin-button');
            
            if (isPinned) {
                button.classList.add('pinned');
                button.title = 'Открепить от переднего плана';
                console.log('Закрепляем виджет поверх всех окон');
            } else {
                button.classList.remove('pinned');
                button.title = 'Закрепить поверх окон';
                console.log('Открепляем виджет');
            }
            
            // Вызываем функцию с задержкой для надежности (как в рабочем варианте)
            window.electronAPI.widget.setAlwaysOnTop(isPinned).then(result => {
                console.log('AlwaysOnTop result:', result);
                
                // Визуальный индикатор для закрепленного виджета
                const widget = document.getElementById('widget');
                if (isPinned && result.success) {
                    widget.style.borderColor = 'rgba(139, 92, 246, 0.8)';
                    widget.style.boxShadow = '0 0 20px rgba(139, 92, 246, 0.4)';
                } else {
                    widget.style.borderColor = 'rgba(139, 92, 246, 0.3)';
                    widget.style.boxShadow = '0 10px 40px rgba(0, 0, 0, 0.8), 0 0 60px rgba(139, 92, 246, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05)';
                }
                
                if (isPinned) {
                    // Дополнительная проверка через секунду
                    setTimeout(() => {
                        console.log('Дополнительная активация виджета');
                    }, 1000);
                }
            }).catch(error => {
                console.error('Ошибка при изменении AlwaysOnTop:', error);
                
                // Возвращаем состояние при ошибке
                isPinned = !isPinned;
                if (isPinned) {
                    button.classList.add('pinned');
                } else {
                    button.classList.remove('pinned');
                }
            });
        }



        // Закрытие виджета
        function closeWidget() {
            window.electronAPI.widget.close();
        }

        // Изменение прозрачности колесиком мыши
        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                const widget = document.getElementById('widget');
                const currentOpacity = parseFloat(getComputedStyle(widget).getPropertyValue('--widget-opacity') || 1);
                const newOpacity = Math.max(0.3, Math.min(1, currentOpacity - e.deltaY * 0.001));
                widget.style.setProperty('--widget-opacity', newOpacity);
            }
        });

        // Перетаскивание окна
        const widget = document.getElementById('widget');
        
        widget.addEventListener('mousedown', (e) => {
            if (e.target.closest('.control-button') || e.target.closest('.deck-card')) return;
            
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            widget.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - dragStartX;
            const deltaY = e.clientY - dragStartY;
            
            window.electronAPI.widget.move(deltaX, deltaY);
            
            dragStartX = e.clientX;
            dragStartY = e.clientY;
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                widget.classList.remove('dragging');
            }
        });

        // Горячие клавиши
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeWidget();
            } else if (e.key === 'p' && e.ctrlKey) {
                togglePin();
            } else if (e.key === 'm' && e.ctrlKey) {
                toggleMode();
            }
        });

        // Магнитное прилипание к краям (реализуется в main.js)
        
        // Инициализация
        window.addEventListener('load', () => {
            // Устанавливаем начальный размер
            window.electronAPI.widget.resize(450, 200);
        });
    </script>
</body>
</html>
